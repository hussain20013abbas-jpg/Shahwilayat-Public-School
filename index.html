<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shahwilayat Public School - Digital Portal</title>
    <meta name="description" content="Official digital portal for Shahwilayat Public School. Manage student profiles, canteen transactions, academic records, and stay updated with school news." />
    <meta name="keywords" content="Shahwilayat Public School, school portal, student management, canteen management, academic records, school news" />
    <meta property="og:title" content="Shahwilayat Public School - Digital Portal" />
    <meta property="og:description" content="Manage student profiles, canteen transactions, and academic records at Shahwilayat Public School." />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/png?seed=Shahwilayat&size=192" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
